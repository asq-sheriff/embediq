apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: embediq
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - embediq.example.com
      secretName: embediq-tls
  rules:
    - host: embediq.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: embediq
                port:
                  number: 80
